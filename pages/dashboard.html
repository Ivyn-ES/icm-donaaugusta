<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - ICM</title>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .container {
            max-width: 500px;
            margin: 0 auto;
            padding: 20px;
        }

        /* GRID PADRONIZADO PARA AMBOS (3 colunas para manter tudo alinhado) */
        .grid-padrao {
            display: grid;
            grid-template-columns: repeat(3, 1fr); 
            gap: 25px 10px;
            padding: 10px;
            justify-items: center;
        }

        /* ESTILO DOS 4 BOTÕES MESTRES (NOME DENTRO - TAMANHO TRAVADO) */
        .btn-mestre {
            width: 90px;
            height: 90px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border: none;
            border-radius: 15px;
            color: white;
            font-weight: bold;
            font-size: 0.75rem;
            cursor: pointer;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            transition: transform 0.1s;
        }

        .btn-mestre span { font-size: 1.8rem; margin-bottom: 5px; }
        .btn-mestre:active { transform: scale(0.95); }

        /* ESTILO DOS BOTÕES INTERNOS (LEGENDA FORA) */
        .btn-interno {
            background: none;
            border: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 90px;
            cursor: pointer;
        }

        .quadrado-cor {
            width: 65px;
            height: 65px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            color: white;
            margin-bottom: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .legenda-externa {
            font-size: 0.75rem;
            font-weight: 600;
            text-align: center;
            color: #2c3e50;
            line-height: 1.2;
        }

        /* Cores dos Mestres */
        #btn-mestre-secretaria { background-color: #FFCC33; color: #5d4037; }
        #btn-mestre-consultas { background-color: #3498db; }
        #btn-mestre-relatorios { background-color: #f39c12; }
        #btn-mestre-admin { background-color: #9b59b6; }
        
        /* Botões de Faixa (Sair/Voltar) */
        .btn-faixa {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            margin-top: 30px;
            text-align: center;
        }
        .btn-voltar { background-color: #ebf2f6; color: #576574; border: 1px solid #cfd9df; }
        .btn-sair { background-color: #c0392b; color: white; }

        .sub-dashboard { display: none; }
    </style>
</head>
<body>
    <div class="container">
        <header style="text-align: center; margin-bottom: 25px;">
            <h1 id="titulo-painel" style="color: #2c3e50;">Painel Administrativo</h1>
            <p id="boasVindas" style="font-weight: bold; color: #7f8c8d;"></p>
        </header>

        <div id="menu-principal">
            <div class="grid-padrao">
                <button class="btn-mestre" id="btn-mestre-secretaria" onclick="abrirSubMenu('view-secretaria', 'Secretaria')">
                    <span>💼</span>Secretaria
                </button>
                <button class="btn-mestre" id="btn-mestre-consultas" onclick="abrirSubMenu('view-consultas', 'Consultas')">
                    <span>🔍</span>Consultas
                </button>
                <button class="btn-mestre" id="btn-mestre-relatorios" onclick="abrirSubMenu('view-relatorios', 'Relatórios')">
                    <span>📊</span>Relatórios
                </button>
                <button class="btn-mestre" id="btn-mestre-admin" onclick="abrirSubMenu('view-admin', 'Administração')">
                    <span>⚙️</span>Admin
                </button>
            </div>
            <button class="btn-faixa btn-sair" id="btnSair" onclick="logout()">Sair</button>
        </div>

        <div id="view-secretaria" class="sub-dashboard">
            <div class="grid-padrao">
                <button class="btn-interno" onclick="window.location.href='chamada.html'">
                    <div class="quadrado-cor" style="background-color: #27ae60;">📝</div>
                    <div class="legenda-externa">Fazer Chamada</div>
                </button>
                <button class="btn-interno" onclick="window.location.href='eventos.html'">
                    <div class="quadrado-cor" style="background-color: #e67e22;">⭐</div>
                    <div class="legenda-externa">CIAs</div>
                </button>
                <button class="btn-interno" id="idBtnCadastro" onclick="window.location.href='cadastro-membro.html'">
                    <div class="quadrado-cor" style="background-color: #34495e;">👤</div>
                    <div class="legenda-externa">Cadastrar Membro</div>
                </button>
                <button class="btn-interno" onclick="window.location.href='admin-locais.html'">
                    <div class="quadrado-cor" style="background-color: #17a2b8;">📍</div>
                    <div class="legenda-externa">Igrejas</div>
                </button>
                <button class="btn-interno" onclick="window.location.href='admin-grupos.html'">
                    <div class="quadrado-cor" style="background-color: #5765f2;">📂</div>
                    <div class="legenda-externa">Criar Grupo</div>
                </button>
            </div>
            <button class="btn-faixa btn-voltar" onclick="voltarAoPrincipal()">Voltar ao Início</button>
        </div>

        <div id="view-consultas" class="sub-dashboard">
            <div class="grid-padrao">
                <button class="btn-interno" onclick="window.location.href='aniversariantes.html'">
                    <div class="quadrado-cor" style="background-color: #3498db;">🎂</div>
                    <div class="legenda-externa">Aniversariantes</div>
                </button>
                <button class="btn-interno" id="btnLista" onclick="window.location.href='lista-membros.html'">
                    <div class="quadrado-cor" style="background-color: #57606f;">📋</div>
                    <div class="legenda-externa">Membros</div>
                </button>
            </div>
            <button class="btn-faixa btn-voltar" onclick="voltarAoPrincipal()">Voltar ao Início</button>
        </div>

        <div id="view-relatorios" class="sub-dashboard">
            <div class="grid-padrao">
                <button class="btn-interno" id="btnRelPresenca" onclick="window.location.href='relatorio-presenca.html'">
                    <div class="quadrado-cor" style="background-color: #ffa502;">📈</div>
                    <div class="legenda-externa">Frequências</div>
                </button>
                <button class="btn-interno" id="btnRelHistorico" onclick="window.location.href='historico-eventos.html'">
                    <div class="quadrado-cor" style="background-color: #747d8c;">📂</div>
                    <div class="legenda-externa">Histórico CIAs</div>
                </button>
            </div>
            <button class="btn-faixa btn-voltar" onclick="voltarAoPrincipal()">Voltar ao Início</button>
        </div>

        <div id="view-admin" class="sub-dashboard">
            <div class="grid-padrao">
                <button class="btn-interno" id="btnUsuarios" onclick="window.location.href='admin-usuarios.html'">
                    <div class="quadrado-cor" style="background-color: #8e44ad;">🔑</div>
                    <div class="legenda-externa">Acessos</div>
                </button>
                <button class="btn-interno" id="btnPermissoes" onclick="window.location.href='admin-permissoes.html'">
                    <div class="quadrado-cor" style="background-color: #c0392b;">🛡️</div>
                    <div class="legenda-externa">Permissões</div>
                </button>
            </div>
            <button class="btn-faixa btn-voltar" onclick="voltarAoPrincipal()">Voltar ao Início</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/supabase-config.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/permissoes.js"></script>
    <script src="../js/script.js"></script>

    <script>
        function abrirSubMenu(idSub, nomeTitulo) {
            document.getElementById('menu-principal').style.display = 'none';
            document.querySelectorAll('.sub-dashboard').forEach(v => v.style.display = 'none');
            document.getElementById(idSub).style.display = 'block';
            document.getElementById('titulo-painel').innerText = nomeTitulo;
        }

        function voltarAoPrincipal() {
            document.querySelectorAll('.sub-dashboard').forEach(view => view.style.display = 'none');
            document.getElementById('menu-principal').style.display = 'block';
            document.getElementById('titulo-painel').innerText = 'Painel Administrativo';
        }

        document.addEventListener('DOMContentLoaded', () => {
            const user = verificarAcesso();
            if (user) {
                document.getElementById('boasVindas').innerText = `Logado como: ${user.nome || user.login}`;
                
                if (typeof ajustarInterfacePorPerfil === 'function') {
                    ajustarInterfacePorPerfil();
                }
            }
        });
    </script>
</body>
</html>
