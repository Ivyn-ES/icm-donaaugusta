<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eventos e CIAs - ICM</title>
    <link rel="stylesheet" href="../css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* Estilo para deixar os contadores bem visíveis no celular */
        .contador-group {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid #eee;
        }
        .controls {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .btn-ctrl {
            width: 40px;
            height: 40px;
            border-radius: 8px;
            border: none;
            background: #007bff;
            color: white;
            font-size: 22px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .btn-minus { background: #e74c3c; }
        .count-val { font-size: 20px; font-weight: bold; min-width: 35px; text-align: center; }
        
        .section-title { 
            background: #f8f9fa; 
            padding: 10px; 
            border-radius: 8px; 
            margin-top: 25px;
            border-left: 5px solid #007bff;
            font-size: 1.1rem;
            color: #2c3e50;
        }

        .card-header-event {
            background: #fff;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            margin-bottom: 20px;
            border: 1px solid #eee;
        }

        .input-evento {
            width: 100%;
            padding: 12px;
            margin-top: 5px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 1rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <header style="display: flex; align-items: center; margin-bottom: 20px;">
            <a href="dashboard.html" class="btn-voltar" style="text-decoration: none;">← Voltar</a>
            <h1 style="flex-grow: 1; text-align: center; margin-right: 60px;">📊 Eventos e CIAs</h1>
        </header>

        <section class="card-header-event">
            <label>📅 Data do Evento</label>
            <input type="date" id="data_especial" class="input-evento">
            
            <label>📍 Local (Igreja Sede)</label>
            <input type="text" id="local_evento" placeholder="Ex: Polo Vila Velha, Igreja Sede..." class="input-evento">

            <label>📝 Descrição do Evento</label>
            <input type="text" id="desc_evento" placeholder="Ex: Seminário de Crianças, Batismo..." class="input-evento">
        </section>

        <h3 class="section-title">👥 MEMBROS</h3>
        <div class="card" id="grupoMembros"></div>

        <h3 class="section-title">🌟 VISITANTES</h3>
        <div class="card" id="grupoVisitantes"></div>

        <section style="margin-top: 30px; gap: 12px; display: flex; flex-direction: column;">
            <button onclick="salvarEventoEspecial()" class="btn-salvar" style="background: #2ecc71; padding: 18px;">💾 Salvar no Banco de Dados</button>
            <button onclick="gerarWhatsEspecial()" class="btn-salvar" style="background: #25d366; padding: 18px;">📱 Enviar Resumo WhatsApp</button>
        </section>
    </div>

    <script src="../js/script.js"></script>
    <script>
    window.onload = async () => {
        // 1. Define as categorias (Exatamente como no Banco)
        const categorias = ["Varões", "Senhoras", "Jovens", "Adolescentes", "Intermediários", "Crianças", "Crianças de Colo"];
        
        // 2. Função para desenhar os botões + e -
        const renderContadores = (containerId, prefixo) => {
            const container = document.getElementById(containerId);
            container.innerHTML = categorias.map(cat => `
                <div class="contador-group">
                    <span style="font-weight: 500; color: #444;">${cat}</span>
                    <div class="controls">
                        <button class="btn-ctrl btn-minus" onclick="alterarContador('${prefixo}_${cat}', -1)">-</button>
                        <span class="count-val" id="val_${prefixo}_${cat}">0</span>
                        <button class="btn-ctrl" onclick="alterarContador('${prefixo}_${cat}', 1)">+</button>
                    </div>
                </div>
            `).join('');
        };

        renderContadores('grupoMembros', 'membro');
        renderContadores('grupoVisitantes', 'vis');

        // 3. VERIFICAÇÃO DE EDIÇÃO (O segredo do MacGyver)
        const urlParams = new URLSearchParams(window.location.search);
        const idEvento = urlParams.get('id');

        if (idEvento) {
            document.querySelector('h1').innerText = "📝 Editar Evento";
            try {
                const { data, error } = await _supabase
                    .from('eventos_especiais')
                    .select('*')
                    .eq('id', idEvento)
                    .single();

                if (error) throw error;

                // Preenche os campos de texto
                document.getElementById('data_especial').value = data.data_evento;
                document.getElementById('local_evento').value = data.local_evento;
                document.getElementById('desc_evento').value = data.descricao;

                // Preenche os números salvos (Membros)
                document.getElementById('val_membro_Varões').innerText = data.m_varoes;
                document.getElementById('val_membro_Senhoras').innerText = data.m_senhoras;
                document.getElementById('val_membro_Jovens').innerText = data.m_jovens;
                document.getElementById('val_membro_Adolescentes').innerText = data.m_adolescentes;
                document.getElementById('val_membro_Intermediários').innerText = data.m_intermediarios;
                document.getElementById('val_membro_Crianças').innerText = data.m_criancas;
                document.getElementById('val_membro_Crianças de Colo').innerText = data.m_colo;

                // Preenche os números salvos (Visitantes)
                document.getElementById('val_vis_Varões').innerText = data.v_varoes;
                document.getElementById('val_vis_Senhoras').innerText = data.v_senhoras;
                document.getElementById('val_vis_Jovens').innerText = data.v_jovens;
                document.getElementById('val_vis_Adolescentes').innerText = data.v_adolescentes;
                document.getElementById('val_vis_Intermediários').innerText = data.v_intermediarios;
                document.getElementById('val_vis_Crianças').innerText = data.v_criancas;
                document.getElementById('val_vis_Crianças de Colo').innerText = data.v_colo;

                // Cria o campo invisível para marcar que é EDIÇÃO
                garantirCampoEdicao(idEvento);

            } catch (err) {
                console.error("Erro ao carregar:", err);
                alert("Erro ao recuperar os dados salvos.");
            }
        } else {
            // CORREÇÃO DA DATA: Pega a data local (evita pular para o dia seguinte)
            const hoje = new Date();
            const dataLocal = hoje.toLocaleDateString('sv-SE'); // Formato AAAA-MM-DD
            document.getElementById('data_especial').value = dataLocal;
        }
    };

    // Função auxiliar para criar/atualizar o ID de edição sem recarregar a página
    function garantirCampoEdicao(id) {
        let hiddenId = document.getElementById('id_evento_edicao');
        if (!hiddenId) {
            hiddenId = document.createElement('input');
            hiddenId.type = 'hidden';
            hiddenId.id = 'id_evento_edicao';
            document.body.appendChild(hiddenId);
        }
        hiddenId.value = id;
    }

    function alterarContador(id, delta) {
        const el = document.getElementById(`val_${id}`);
        let atual = parseInt(el.innerText);
        atual = Math.max(0, atual + delta);
        el.innerText = atual;
    }
</script>

</body>
</html>
