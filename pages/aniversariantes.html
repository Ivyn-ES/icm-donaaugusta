<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aniversariantes - ICM</title>
    <link rel="stylesheet" href="../css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
   
   <style>
    /* Container dos Filtros */
    .filtros-aniversario {
        display: flex;
        gap: 15px;
        flex-wrap: wrap;
        background: #ffffff;
        padding: 20px;
        border-radius: 12px;
        margin-bottom: 25px;
        align-items: flex-end;
        box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        border: 1px solid #eee;
    }

    /* Cada campo (Mês e Público) */
    .campo-filtro {
        display: flex;
        flex-direction: column;
        flex: 1; /* Faz os campos crescerem por igual */
        min-width: 150px; /* Impede que fiquem muito estreitos */
    }

    .campo-filtro label {
        font-size: 0.9rem;
        font-weight: bold;
        margin-bottom: 8px;
        color: #333;
    }

    .campo-filtro select {
        padding: 12px; /* Aumenta a área de toque */
        border-radius: 8px;
        border: 1px solid #ccc;
        font-size: 1rem;
        background-color: #fff;
    }

    /* Botões */
    .area-botoes {
        display: flex;
        gap: 10px;
        width: 100%; /* No celular, os botões ficam embaixo dos campos */
        margin-top: 10px;
    }

    .btn-gerar, .btn-whatsapp {
        flex: 1;
        border: none;
        padding: 14px;
        border-radius: 8px;
        cursor: pointer;
        font-weight: bold;
        font-size: 1rem;
        color: white;
        transition: opacity 0.2s;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
    }

    .btn-gerar { background-color: #27ae60; }
    .btn-whatsapp { background-color: #25d366; }

    .btn-gerar:active, .btn-whatsapp:active { opacity: 0.8; }

    /* Tabela */
    #tabelaAniversariantes {
        width: 100%;
        border-collapse: collapse;
        background: white;
        border-radius: 8px;
        overflow: hidden;
    }

    #tabelaAniversariantes th {
        background-color: #f8f9fa;
        padding: 15px 10px;
        text-align: left;
        border-bottom: 2px solid #dee2e6;
        color: #495057;
    }

    #tabelaAniversariantes td {
        padding: 15px 10px;
        border-bottom: 1px solid #eee;
        font-size: 1rem;
    }

    /* Ajuste para telas grandes (PC) */
    @media (min-width: 600px) {
        .area-botoes {
            width: auto; /* No PC, os botões não ocupam a linha toda */
            margin-top: 0;
        }
        .btn-gerar, .btn-whatsapp {
            padding: 12px 25px;
            flex: none;
        }
    }
</style>

</head>
<body>

    <header>
        <button onclick="window.location.href='../painel.html'" class="btn-voltar" style="background:none; border:none; color:white; font-size:1.2rem; cursor:pointer;">← Voltar</button>
        <h1 style="display:inline-block; margin-left:10px;">🎂 Aniversariantes</h1>
    </header>

    <main class="container">
<section class="filtros-aniversario">
    <div class="campo-filtro">
        <label for="filtroMes">📅 Mês:</label>
        <select id="filtroMes">
            <option value="1">Janeiro</option>
            <option value="2">Fevereiro</option>
            </select>
    </div>

    <div class="campo-filtro">
        <label for="filtroSexo">👥 Opção:</label>
        <select id="filtroSexo">
            <option value="Todos">Todos</option>
            <option value="Masculino">Irmãos</option>
            <option value="Feminino">Irmãs</option>
        </select>
    </div>

    <div class="area-botoes">
        <button onclick="gerarRelatorioAniversariantes()" class="btn-gerar">
            🔍 Consultar
        </button>
        <button onclick="enviarAniversariantesZap()" class="btn-whatsapp">
            📲 WhatsApp
        </button>
    </div>
</section>

        <hr>

        <section class="lista-resultados">
            <table id="tabelaAniversariantes">
                <thead>
                    <tr>
                        <th style="width: 60px; text-align: center;">Dia</th>
                        <th>Nome</th>
                        <th style="width: 80px; text-align: center;">Sexo</th>
                    </tr>
                </thead>
                <tbody id="corpoTabelaAniversarios">
                    </tbody>
            </table>
            <div id="msgVazia" style="display:none; text-align:center; padding: 20px; color: #666;">
                Nenhum aniversariante encontrado para este mês.
            </div>
        </section>
    </main>

<script src="../js/script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const mesAtual = new Date().getMonth() + 1;
            document.getElementById('filtroMes').value = mesAtual;
            
            // Pequeno atraso para garantir que o script.js e o Supabase carreguem antes
            setTimeout(() => {
                if(typeof gerarRelatorioAniversariantes === 'function') {
                    gerarRelatorioAniversariantes();
                } else {
                    console.error("Erro: A função gerarRelatorioAniversariantes não foi carregada. Verifique o caminho do script.js");
                }
            }, 500);
        });
    </script>
</body>
</html>
