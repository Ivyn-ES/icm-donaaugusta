<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aniversariantes - ICM</title>
    <link rel="stylesheet" href="../css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
   
   <style>
    /* Reset básico para evitar conflitos com o style.css global */
    header {
        background-color: #2c3e50; /* Cor padrão da ICM */
        color: white;
        padding: 15px;
        display: flex;
        align-items: center;
        width: 100%;
        box-sizing: border-box;
    }

    .container {
        padding: 15px;
        max-width: 1000px;
        margin: 0 auto;
    }

    /* Container dos Filtros */
    .filtros-aniversario {
        display: flex;
        gap: 15px;
        flex-wrap: wrap;
        background: #ffffff;
        padding: 20px;
        border-radius: 12px;
        margin-top: 20px;
        margin-bottom: 25px;
        box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        border: 1px solid #eee;
    }

    .campo-filtro {
        display: flex;
        flex-direction: column;
        flex: 1; 
        min-width: 140px;
    }

    .campo-filtro label {
        font-size: 0.9rem;
        font-weight: bold;
        margin-bottom: 8px;
        color: #333;
    }

    .campo-filtro select {
        padding: 12px;
        border-radius: 8px;
        border: 1px solid #ccc;
        font-size: 1rem;
        background-color: #fff;
        width: 100%;
    }

    .area-botoes {
        display: flex;
        gap: 10px;
        width: 100%;
        margin-top: 10px;
    }

    .btn-gerar, .btn-whatsapp {
        flex: 1;
        border: none;
        padding: 14px;
        border-radius: 8px;
        cursor: pointer;
        font-weight: bold;
        font-size: 1rem;
        color: white;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
    }

    .btn-gerar { background-color: #27ae60; }
    .btn-whatsapp { background-color: #25d366; }

    /* Tabela */
    .lista-resultados {
        overflow-x: auto; /* Permite rolar pro lado no celular se a tabela for grande */
    }

    #tabelaAniversariantes {
        width: 100%;
        border-collapse: collapse;
        background: white;
        margin-top: 10px;
    }

    #tabelaAniversariantes th {
        background-color: #f8f9fa;
        padding: 15px 10px;
        text-align: left;
        border-bottom: 2px solid #dee2e6;
    }

    #tabelaAniversariantes td {
        padding: 15px 10px;
        border-bottom: 1px solid #eee;
    }

    /* Ajuste para PC */
    @media (min-width: 600px) {
        .area-botoes {
            width: auto;
            margin-top: 0;
        }
        .btn-gerar, .btn-whatsapp {
            padding: 12px 25px;
            flex: none;
        }
        .filtros-aniversario {
            align-items: flex-end;
        }
    }
</style>

</head>
<body>

    <header>
        <button onclick="window.location.href='../dashboard.html'" class="btn-voltar" style="background:none; border:none; color:white; font-size:1.2rem; cursor:pointer;">← Voltar</button>
        <h2 style="margin: 0 0 0 15px;">🎂 Aniversariantes</h2>
    </header>

    <main class="container">
        <section class="filtros-aniversario">
            <div class="campo-filtro">
                <label for="filtroMes">📅 Mês:</label>
                <select id="filtroMes">
                    <option value="1">Janeiro</option>
                    <option value="2">Fevereiro</option>
                    <option value="3">Março</option>
                    <option value="4">Abril</option>
                    <option value="5">Maio</option>
                    <option value="6">Junho</option>
                    <option value="7">Julho</option>
                    <option value="8">Agosto</option>
                    <option value="9">Setembro</option>
                    <option value="10">Outubro</option>
                    <option value="11">Novembro</option>
                    <option value="12">Dezembro</option>
                </select>
            </div>

            <div class="campo-filtro">
                <label for="filtroSexo">👥 Opção:</label>
                <select id="filtroSexo">
                    <option value="Todos">Todos</option>
                    <option value="Masculino">Irmãos</option>
                    <option value="Feminino">Irmãs</option>
                </select>
            </div>

            <div class="area-botoes">
                <button onclick="gerarRelatorioAniversariantes()" class="btn-gerar">
                    🔍 Consultar
                </button>
                <button onclick="enviarAniversariantesZap()" class="btn-whatsapp">
                    📲 WhatsApp
                </button>
            </div>
        </section>

        <section class="lista-resultados">
            <table id="tabelaAniversariantes">
                <thead>
                    <tr>
                        <th style="width: 60px; text-align: center;">Dia</th>
                        <th>Nome</th>
                        <th style="width: 80px; text-align: center;">Sexo</th>
                    </tr>
                </thead>
                <tbody id="corpoTabelaAniversarios">
                    </tbody>
            </table>
            <div id="msgVazia" style="display:none; text-align:center; padding: 20px; color: #666;">
                Nenhum aniversariante encontrado.
            </div>
        </section>
    </main>

    <script src="../js/script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Define o mês atual automaticamente
            const mesAtual = new Date().getMonth() + 1;
            const selectMes = document.getElementById('filtroMes');
            selectMes.value = mesAtual;
            
            setTimeout(() => {
                if(typeof gerarRelatorioAniversariantes === 'function') {
                    gerarRelatorioAniversariantes();
                }
            }, 500);
        });
    </script>
</body>
</html>
