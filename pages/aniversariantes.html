<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aniversariantes - ICM</title>
    <link rel="stylesheet" href="../css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        body { display: block !important; }

        .container-aniversarios {
            background: white;
            padding: 2rem;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 800px;
            margin: 20px auto;
        }

        .filtros-aniversario {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            margin-top: 20px;
            margin-bottom: 25px;
            align-items: flex-end;
        }

        .campo-filtro {
            display: flex;
            flex-direction: column;
            flex: 1;
            min-width: 150px;
        }

        .area-botoes {
            display: flex;
            gap: 10px;
            width: 100%;
            margin-top: 10px;
        }

        .btn-acao {
            flex: 1;
            padding: 15px;
            border: none;
            border-radius: 12px;
            font-weight: bold;
            font-size: 1rem;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-consultar { background-color: #27ae60; }
        .btn-zap { background-color: #25d366; }

        @media (min-width: 600px) {
            .area-botoes { width: auto; margin-top: 0; }
            .btn-acao { flex: none; padding: 12px 25px; }
        }

        td { padding: 12px 8px; }
        th { background-color: #f8f9fa; color: #2d3436; }
    </style>
</head>
<body>

    <div class="container-aniversarios">
        <header style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; border-bottom: 2px solid #eee; padding-bottom: 10px;">
            <a href="dashboard.html" class="btn-voltar">← Voltar</a>
            <h1 style="margin: 0; flex-grow: 1; text-align: center;">🎂 Aniversariantes</h1>
            <div style="width: 80px;"></div>
        </header>

        <section class="filtros-aniversario">
            <div class="campo-filtro">
                <label>📅 Mês:</label>
                <select id="filtroMes">
                    <option value="1">Janeiro</option>
                    <option value="2">Fevereiro</option>
                    <option value="3">Março</option>
                    <option value="4">Abril</option>
                    <option value="5">Maio</option>
                    <option value="6">Junho</option>
                    <option value="7">Julho</option>
                    <option value="8">Agosto</option>
                    <option value="9">Setembro</option>
                    <option value="10">Outubro</option>
                    <option value="11">Novembro</option>
                    <option value="12">Dezembro</option>
                </select>
            </div>

            <div class="campo-filtro">
                <label>👥 Opção:</label>
                <select id="filtroSexo">
                    <option value="Todos">Todos</option>
                    <option value="Masculino">Irmãos</option>
                    <option value="Feminino">Irmãs</option>
                </select>
            </div>

            <div class="area-botoes">
                <button onclick="gerarRelatorioAniversariantes()" class="btn-acao btn-consultar">🔍 Consultar</button>
                <button onclick="enviarAniversariantesZap()" class="btn-acao btn-zap">📲 WhatsApp</button>
            </div>
        </section>

        <div class="tabela-responsiva">
            <table>
                <thead>
                    <tr>
                        <th style="text-align: center; width: 60px;">Dia</th>
                        <th>Nome</th>
                        <th style="text-align: center; width: 80px;">Sexo</th>
                    </tr>
                </thead>
                <tbody id="corpoTabelaAniversarios"></tbody>
            </table>
        </div>
        
        <div id="msgVazia" style="display:none; text-align:center; padding: 30px; color: #636e72; font-weight: bold;">
            Nenhum aniversariante encontrado.
        </div>
    </div>

    <script src="../js/script.js"></script>
    <script>
        let aniversariantesFiltrados = [];

        // 1. GERA O RELATÓRIO NA TELA
        async function gerarRelatorioAniversariantes() {
            const mesBusca = document.getElementById('filtroMes').value;
            const sexoBusca = document.getElementById('filtroSexo').value;
            const corpo = document.getElementById('corpoTabelaAniversarios');
            const msgVazia = document.getElementById('msgVazia');

            corpo.innerHTML = "<tr><td colspan='3' style='text-align:center;'>Buscando...</td></tr>";

            try {
                // Busca todos os membros ativos
                let { data: membros, error } = await _supabase
                    .from('membros')
                    .select('nome, apelido, data_nascimento, sexo')
                    .eq('status_registro', 'Ativo');

                if (error) throw error;

                // Filtra pelo mês da data_nascimento (formato YYYY-MM-DD)
                aniversariantesFiltrados = membros.filter(m => {
                    if (!m.data_nascimento) return false;
                    const mesMembro = parseInt(m.data_nascimento.split('-')[1]);
                    const mesFiltro = parseInt(mesBusca);
                    
                    const matchesMes = mesMembro === mesFiltro;
                    const matchesSexo = (sexoBusca === 'Todos' || m.sexo === sexoBusca);
                    
                    return matchesMes && matchesSexo;
                });

                // Ordena por dia
                aniversariantesFiltrados.sort((a, b) => {
                    return parseInt(a.data_nascimento.split('-')[2]) - parseInt(b.data_nascimento.split('-')[2]);
                });

                if (aniversariantesFiltrados.length === 0) {
                    corpo.innerHTML = "";
                    msgVazia.style.display = 'block';
                    return;
                }

                msgVazia.style.display = 'none';
                corpo.innerHTML = aniversariantesFiltrados.map(m => {
                    const dia = m.data_nascimento.split('-')[2];
                    const nomeExibir = m.apelido || m.nome;
                    const iconSexo = m.sexo === 'Masculino' ? '👨‍🦱' : '👩‍🦰';
                    return `
                        <tr>
                            <td style="text-align: center; font-weight: bold;">${dia}</td>
                            <td>${nomeExibir}</td>
                            <td style="text-align: center;">${iconSexo}</td>
                        </tr>
                    `;
                }).join('');

            } catch (err) {
                console.error("Erro:", err);
                corpo.innerHTML = "<tr><td colspan='3' style='color:red;'>Erro ao carregar dados.</td></tr>";
            }
        }

        // 2. ENVIA PARA O WHATSAPP
        function enviarAniversariantesZap() {
            if (aniversariantesFiltrados.length === 0) {
                alert("Consulte a lista primeiro ou verifique se há aniversariantes.");
                return;
            }

            const selectMes = document.getElementById('filtroMes');
            const nomeMes = selectMes.options[selectMes.selectedIndex].text;
            
            let msg = `🎂 *Aniversariantes de ${nomeMes} - ICM*\n\n`;

            aniversariantesFiltrados.forEach(m => {
                const dia = m.data_nascimento.split('-')[2];
                const nome = m.apelido || m.nome.split(' ')[0];
                msg += `*${dia}* - ${nome}\n`;
            });

            msg += `\n_Parabéns a todos! Que o Senhor os abençoe!_ 🙌`;

            const url = `https://api.whatsapp.com/send?text=${encodeURIComponent(msg)}`;
            window.open(url, '_blank');
        }

        function inicializarPagina() {
            if (typeof _supabase !== 'undefined') {
                gerarRelatorioAniversariantes();
            } else {
                setTimeout(inicializarPagina, 200);
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            const mesAtual = new Date().getMonth() + 1;
            const selectMes = document.getElementById('filtroMes');
            if(selectMes) selectMes.value = mesAtual;
            inicializarPagina();
        });
    </script>
</body>
</html>
