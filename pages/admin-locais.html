<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerenciar Locais - ICM</title>
    <link rel="stylesheet" href="../css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .input-evento {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 1rem;
        }
        .section-title { 
            background: #f8f9fa; 
            padding: 10px; 
            border-radius: 8px; 
            margin-top: 25px;
            border-left: 5px solid #2ecc71;
            font-size: 1.1rem;
            color: #2c3e50;
        }
        .local-item:last-child { border-bottom: none; }
    </style>
</head>
<body>
    <div class="container">
        <header style="display: flex; align-items: center; margin-bottom: 20px; border-bottom: 2px solid #eee; padding-bottom: 10px;">
            <a href="dashboard.html" class="btn-voltar" style="text-decoration: none;">← Voltar</a>
            <h1 style="flex-grow: 1; text-align: center; margin-right: 60px;">📍 Locais (Igrejas)</h1>
        </header>

        <section class="card" style="background: #fff; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05);">
            <h3>Cadastrar Novo Local</h3>
            <p style="font-size: 0.9rem; color: #666; margin-bottom: 15px;">Esses nomes aparecerão na lista de locais no módulo de CIAs.</p>
            <div style="display: flex; gap: 10px;">
                <input type="text" id="novo_local" placeholder="Ex: Polo Vila Velha" class="input-evento" style="margin:0; flex-grow: 1;">
                <button onclick="salvarLocal()" id="btnAdicionar" class="btn-salvar" style="width: auto; padding: 10px 20px; background-color: #2ecc71; border-radius: 8px; font-weight: bold; border: none; color: white; cursor: pointer;">➕</button>
            </div>
        </section>

        <h3 class="section-title">Igrejas Cadastradas</h3>
        <div id="listaLocais" class="card" style="padding: 0; margin-top: 10px; overflow: hidden; border-radius: 12px; border: 1px solid #eee;">
            <p style="padding: 20px; text-align: center;">Carregando locais...</p>
        </div>
    </div>

    <script src="../js/supabase-config.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/script.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            // Verifica acesso de admin
            if (typeof verificarAcesso === 'function') {
                const user = verificarAcesso();
                if (user) {
                    const nivel = (user.permissao || user.nivel || "").toLowerCase();
                    if (nivel !== 'admin' && nivel !== 'master') {
                        alert('Acesso restrito a administradores.');
                        window.location.href = 'dashboard.html';
                        return;
                    }
                }
            }
            await carregarTabelaLocais();
        });

        async function carregarTabelaLocais() {
            const container = document.getElementById('listaLocais');
            try {
                const { data, error } = await _supabase
                    .from('igrejas_locais')
                    .select('*')
                    .order('nome_igreja', { ascending: true });
                
                if (error) throw error;
                
                if (!data || data.length === 0) {
                    container.innerHTML = "<p style='padding: 20px; text-align: center; color: #999;'>Nenhuma igreja cadastrada.</p>";
                    return;
                }

                container.innerHTML = data.map(l => `
                    <div class="local-item" style="display: flex; justify-content: space-between; align-items: center; padding: 15px; border-bottom: 1px solid #eee; background: #fff;">
                        <span style="font-weight: 500; color: #333;">${l.nome_igreja}</span>
                        <button onclick="excluirLocal('${l.id}', '${l.nome_igreja}')" style="background:none; border:none; cursor:pointer; font-size: 1.2rem; transition: transform 0.2s;" onmouseover="this.style.transform='scale(1.2)'" onmouseout="this.style.transform='scale(1)'" title="Excluir">🗑️</button>
                    </div>
                `).join('');
            } catch (err) {
                console.error("Erro ao carregar locais:", err);
                container.innerHTML = "<p style='padding: 20px; color: #e74c3c; text-align: center;'>Erro ao carregar dados do banco.</p>";
            }
        }

        async function salvarLocal() {
            const input = document.getElementById('novo_local');
            const btn = document.getElementById('btnAdicionar');
            const nome = input.value.trim();
            
            if (!nome) return alert("Digite o nome da igreja.");

            btn.disabled = true;
            btn.innerText = "⌛";

            try {
                const { error } = await _supabase.from('igrejas_locais').insert([{ nome_igreja: nome }]);
                if (error) {
                    if (error.code === '42501') throw new Error("Sem permissão no banco (RLS).");
                    throw error;
                }
                
                input.value = '';
                await carregarTabelaLocais();
            } catch (err) {
                alert("Erro ao salvar: " + err.message);
            } finally {
                btn.disabled = false;
                btn.innerText = "➕";
            }
        }

        async function excluirLocal(id, nome) {
            if (!confirm(`Deseja remover "${nome}" da lista?`)) return;
            try {
                const { error } = await _supabase.from('igrejas_locais').delete().eq('id', id);
                if (error) throw error;
                await carregarTabelaLocais();
            } catch (err) {
                alert("Erro ao excluir local.");
            }
        }
    </script>
</body>
</html>
