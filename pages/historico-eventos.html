<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Histórico de Eventos - ICM</title>
    <link rel="stylesheet" href="../css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .tabela-historico {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
            background: white;
            border-radius: 8px;
            overflow: hidden;
        }
        .tabela-historico th, .tabela-historico td {
            padding: 12px 8px;
            text-align: left;
            border-bottom: 1px solid #eee;
            font-size: 0.9rem;
        }
        .tabela-historico th {
            background-color: #007bff;
            color: white;
            font-weight: 600;
        }
        .btn-detalhes {
            background: #f1f1f1;
            border: 1px solid #ddd;
            border-radius: 5px;
            padding: 5px 10px;
            cursor: pointer;
            font-size: 1.1rem;
        }
        /* Estilo para telas pequenas */
        @media (max-width: 600px) {
            .tabela-historico th:nth-child(3), 
            .tabela-historico td:nth-child(3) { display: none; } /* Esconde 'Local' no celular pra caber */
        }
    </style>
</head>
<body>
    <div class="container">
        <header style="display: flex; align-items: center; margin-bottom: 20px;">
            <a href="dashboard.html" class="btn-voltar" style="text-decoration: none;">← Voltar</a>
            <h1 style="flex-grow: 1; text-align: center; margin-right: 60px;">📂 Histórico</h1>
        </header>

<div style="margin-bottom: 15px;">
    <input type="text" id="filtroHistorico" placeholder="🔍 Buscar por Local ou Evento..." 
           onkeyup="filtrarTabela()" 
           style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #ccc; font-size: 1rem;">
</div>

        <section class="card">
            <h3 style="margin-top: 0; color: #2c3e50;">📋 Últimos Eventos Salvos</h3>
            <div style="overflow-x: auto;">
                <table class="tabela-historico">
                    <thead>
                        <tr>
                            <th style="text-align: center; width: 90px;">📅 Data</th>
                            <th>📝 Evento</th>
                            <th>📍 Local</th>
                            <th style="text-align: center;">Zap</th>
                        </tr>
                    </thead>
                    <tbody id="corpoHistoricoEventos">
                        </tbody>
                </table>
            </div>
            <div id="msgVazia" style="display:none; text-align:center; padding:20px; color:#666;">
                Nenhum evento encontrado no banco.
            </div>
        </section>
    </div>

    <script src="../js/script.js"></script>
    <script>
        window.onload = () => {
            if (typeof carregarHistoricoEventos === 'function') {
                carregarHistoricoEventos();
            }
        };

function filtrarTabela() {
    const input = document.getElementById("filtroHistorico");
    const filter = input.value.toUpperCase();
    const table = document.getElementById("corpoHistoricoEventos");
    const tr = table.getElementsByTagName("tr");

    for (let i = 0; i < tr.length; i++) {
        // Busca na coluna da Descrição (1) e do Local (2)
        const tdDesc = tr[i].getElementsByTagName("td")[1];
        const tdLocal = tr[i].getElementsByTagName("td")[2];
        if (tdDesc || tdLocal) {
            const txtValue = (tdDesc.textContent || tdDesc.innerText) + " " + 
                             (tdLocal.textContent || tdLocal.innerText);
            if (txtValue.toUpperCase().indexOf(filter) > -1) {
                tr[i].style.display = "";
            } else {
                tr[i].style.display = "none";
            }
        }
    }
}
    </script>
</body>
</html>
