<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aniversariantes - ICM</title>
    <link rel="stylesheet" href="../style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .filtros-aniversario {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            background: #f9f9f9;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            align-items: flex-end;
        }
        .campo-filtro {
            display: flex;
            flex-direction: column;
            flex: 1;
            min-width: 120px;
        }
        .campo-filtro label {
            font-size: 0.8rem;
            font-weight: bold;
            margin-bottom: 5px;
            color: #555;
        }
        .campo-filtro select {
            padding: 8px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }
        .btn-gerar {
            background-color: #27ae60;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }
        #tabelaAniversariantes {
            width: 100%;
            border-collapse: collapse;
        }
        #tabelaAniversariantes th {
            background-color: #f2f2f2;
            padding: 10px;
            text-align: left;
            border-bottom: 2px solid #ddd;
        }
        #tabelaAniversariantes td {
            padding: 10px;
            border-bottom: 1px solid #eee;
        }
    </style>
</head>
<body>

    <header>
        <button onclick="window.location.href='../painel.html'" class="btn-voltar" style="background:none; border:none; color:white; font-size:1.2rem; cursor:pointer;">← Voltar</button>
        <h1 style="display:inline-block; margin-left:10px;">🎂 Aniversariantes</h1>
    </header>

    <main class="container">
        <section class="filtros-aniversario">
            <div class="campo-filtro">
                <label for="filtroMes">Mês:</label>
                <select id="filtroMes">
                    <option value="1">Janeiro</option>
                    <option value="2">Fevereiro</option>
                    <option value="3">Março</option>
                    <option value="4">Abril</option>
                    <option value="5">Maio</option>
                    <option value="6">Junho</option>
                    <option value="7">Julho</option>
                    <option value="8">Agosto</option>
                    <option value="9">Setembro</option>
                    <option value="10">Outubro</option>
                    <option value="11">Novembro</option>
                    <option value="12">Dezembro</option>
                </select>
            </div>

            <div class="campo-filtro">
                <label for="filtroSexo">Público:</label>
                <select id="filtroSexo">
                    <option value="Todos">Todos</option>
                    <option value="Masculino">Irmãos</option>
                    <option value="Feminino">Irmãs</option>
                </select>
            </div>

            <button onclick="gerarRelatorioAniversariantes()" class="btn-gerar">Consultar</button>
        </section>

        <hr>

        <section class="lista-resultados">
            <table id="tabelaAniversariantes">
                <thead>
                    <tr>
                        <th style="width: 60px; text-align: center;">Dia</th>
                        <th>Nome</th>
                        <th style="width: 80px; text-align: center;">Sexo</th>
                    </tr>
                </thead>
                <tbody id="corpoTabelaAniversarios">
                    </tbody>
            </table>
            <div id="msgVazia" style="display:none; text-align:center; padding: 20px; color: #666;">
                Nenhum aniversariante encontrado para este mês.
            </div>
        </section>
    </main>

    <script src="../script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const mesAtual = new Date().getMonth() + 1;
            document.getElementById('filtroMes').value = mesAtual;
            
            // Pequeno atraso para garantir que o script.js e o Supabase carreguem antes
            setTimeout(() => {
                if(typeof gerarRelatorioAniversariantes === 'function') {
                    gerarRelatorioAniversariantes();
                } else {
                    console.error("Erro: A função gerarRelatorioAniversariantes não foi carregada. Verifique o caminho do script.js");
                }
            }, 500);
        });
    </script>
</body>
</html>
