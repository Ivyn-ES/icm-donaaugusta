<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestão de Usuários - ICM</title>
    <link rel="stylesheet" href="../css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .btn-tabela {
            border: none;
            padding: 8px;
            border-radius: 4px;
            cursor: pointer;
            margin: 0 2px;
            color: white;
            font-size: 1rem;
        }
        .btn-senha { background-color: #f1c40f; }
        .btn-excluir { background-color: #e74c3c; }
        .btn-tabela:hover { opacity: 0.8; }
    </style>
</head>
<body>
    <div class="container">
        <header style="text-align: center; margin-bottom: 20px;">
            <h1>🔑 Gestão de Acessos (Usuários)</h1>
            <p>Olá, <strong id="nomeAdmin"></strong>! Aqui você cria novos acessos.</p>
        </header>

        <section class="admin-section" style="background: #f8f9fa; padding: 20px; border-radius: 10px; border: 1px solid #ddd;">
            <h3>➕ Criar Novo Login</h3>
            <form id="formUsuario" style="display: flex; flex-direction: column; gap: 10px;">
                <div class="campo">
                    <label>Login (Usuário):</label>
                    <input type="text" id="novoLogin" placeholder="Ex: marcos_gp01" required>
                </div>
                <div class="campo">
                    <label>Senha:</label>
                    <input type="password" id="novaSenha" required>
                </div>
                <div class="linha-dupla">
                    <div class="campo">
                        <label>Nível de Permissão:</label>
                        <select id="nivelAcesso">
                            <option value="Master">Master</option>
                            <option value="Admin">Admin</option>
                            <option value="Coordenadora">Coordenadora (Senhoras)</option>
                            <option value="User">Resp Grupo</option>
                            <option value="Apoio">Apoio (Faz Chamada)</option>
                            <option value="Livre">Membro (apenas leitura)</option>
                        </select>
                    </div>
                    <div class="campo">
                        <label>Vincular ao Grupo:</label>
                        <select id="grupo_vinculado">
                            <option value="">Todos (Admin)</option>
                        </select>
                    </div>
                </div>
                <button type="submit" class="btn-salvar" style="margin-top: 10px;">💾 Salvar Novo Usuário</button>
            </form>
        </section>

        <hr style="margin: 30px 0;">

        <section>
            <h3>👥 Usuários Cadastrados</h3>
            <div class="tabela-responsiva">
                <table style="width: 100%; border-collapse: collapse;">
                    <thead>
                        <tr style="background: #e9ecef;">
                            <th style="padding: 10px; text-align: left;">Usuário</th>
                            <th style="text-align: left;">Nível</th>
                            <th style="text-align: left;">Grupo</th>
                            <th style="text-align: center;">Ação</th>
                        </tr>
                    </thead>
                    <tbody id="corpoTabelaUsuarios">
                        <tr><td colspan="4" style="text-align: center;">Carregando...</td></tr>
                    </tbody>
                </table>
            </div>
        </section>

        <div style="margin-top:30px; display: flex; gap: 10px;">
            <a href="dashboard.html" class="btn-voltar" style="flex: 1; text-align: center; text-decoration: none; padding: 12px; background: #6c757d; color: white; border-radius: 8px;">← Dashboard</a>
            <button onclick="logout()" style="flex: 1; padding: 12px; background: #dc3545; color: white; border: none; border-radius: 8px; cursor: pointer;">🚪 Sair</button>
        </div>
    </div>

    <script src="../js/script.js"></script>
    <script>
        let usuarioLogadoGlobal = null;

        document.addEventListener('DOMContentLoaded', async () => {
            usuarioLogadoGlobal = verificarAcesso();
            if (usuarioLogadoGlobal) {
                document.getElementById('nomeAdmin').innerText = usuarioLogadoGlobal.nome || usuarioLogadoGlobal.login;
                
                const nivelLogado = (usuarioLogadoGlobal.permissao || usuarioLogadoGlobal.nivel || "").toLowerCase();

                if (nivelLogado !== 'admin' && nivelLogado !== 'master') {
                    alert('Acesso negado! Esta área é restrita a administradores.');
                    window.location.href = 'dashboard.html';
                    return;
                }

                if (typeof carregarGruposNoSelect === 'function') {
                    await carregarGruposNoSelect();
                }

                atualizarTabelaUsuarios();
            }
        });

        async function atualizarTabelaUsuarios() {
            const corpo = document.getElementById('corpoTabelaUsuarios');
            
            // Busca usuários diretamente do banco
            const { data: usuarios, error } = await _supabase
                .from('usuarios')
                .select('*')
                .order('login', { ascending: true });

            if (error) {
                corpo.innerHTML = '<tr><td colspan="4">Erro ao carregar usuários.</td></tr>';
                return;
            }

            corpo.innerHTML = '';
            usuarios.forEach(u => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td style="padding: 10px; border-bottom: 1px solid #eee;">${u.login}</td>
                    <td style="border-bottom: 1px solid #eee;">${u.permissao || u.nivel}</td>
                    <td style="border-bottom: 1px solid #eee;">${u.grupo_vinculado || '---'}</td>
                    <td style="text-align: center; border-bottom: 1px solid #eee;">
                        <button onclick="solicitarNovaSenha('${u.id}', '${u.login}')" class="btn-tabela btn-senha" title="Alterar Senha">🔑</button>
                        <button onclick="executarExclusao('${u.id}')" class="btn-tabela btn-excluir" title="Excluir">🗑️</button>
                    </td>
                `;
                corpo.appendChild(tr);
            });
        }

        async function solicitarNovaSenha(id, login) {
            const nova = prompt(`Digite a nova senha para [ ${login} ] :`);
            if (nova && nova.length >= 4) {
                const { error } = await _supabase.from('usuarios').update({ senha: nova }).eq('id', id);
                if (!error) alert('✅ Senha alterada!');
                else alert('❌ Erro ao alterar.');
            } else if (nova !== null) {
                alert('⚠️ Senha muito curta (mínimo 4 caracteres).');
            }
        }

        async function executarExclusao(id) {
            if (confirm('Tem certeza que deseja excluir este usuário?')) {
                const { error } = await _supabase.from('usuarios').delete().eq('id', id);
                if (!error) {
                    alert('Usuário removido!');
                    atualizarTabelaUsuarios();
                }
            }
        }

        document.getElementById('formUsuario').addEventListener('submit', async (e) => {
            e.preventDefault();
            const dados = {
                login: document.getElementById('novoLogin').value.trim(),
                senha: document.getElementById('novaSenha').value.trim(),
                permissao: document.getElementById('nivelAcesso').value,
                grupo_vinculado: document.getElementById('grupo_vinculado').value
            };

            const ok = await criarUsuario(dados);
            if (ok) {
                document.getElementById('formUsuario').reset();
                atualizarTabelaUsuarios();
            }
        });
    </script>
</body>
</html>
