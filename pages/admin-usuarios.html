<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestão de Usuários - ICM</title>
    <link rel="stylesheet" href="../css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .btn-tabela {
            border: none;
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
            margin: 0 3px;
            color: white;
            font-size: 1rem;
            transition: transform 0.1s;
        }
        .btn-senha { background-color: #f1c40f; color: #000; }
        .btn-excluir { background-color: #e74c3c; }
        .btn-tabela:hover { transform: scale(1.05); opacity: 0.9; }
        
        td { padding: 12px 10px; border-bottom: 1px solid #eee; }
        th { padding: 12px 10px; background: #e9ecef; color: #2d3436; }

        .col-acao { width: 110px; text-align: center; }
        .col-nivel { width: 150px; text-align: left; }

        .tag-nivel {
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.85rem;
            font-weight: bold;
            background: #dfe6e9;
            color: #2d3436;
            text-transform: uppercase;
        }
    </style>
</head>
<body>
    <div class="container">
        <header style="text-align: center; margin-bottom: 25px;">
            <span style="font-size: 50px;">🔐</span>
            <h1 style="margin: 0;">Gestão de Acessos</h1>
            <p>Olá, <strong id="nomeAdmin">...</strong>! Gerencie quem acessa o sistema.</p>
        </header>

        <section class="admin-section" style="background: #fff; padding: 20px; border-radius: 12px; border: 1px solid #ddd; box-shadow: 0 4px 6px rgba(0,0,0,0.05);">
            <h3 style="margin-top: 0;">➕ Novo Acesso</h3>
            <form id="formUsuario" style="display: flex; flex-direction: column; gap: 15px;">
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                    <div class="campo">
                        <label style="font-weight: bold;">Login:</label>
                        <input type="text" id="novoLogin" placeholder="Ex: joao_secre" required style="width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #ccc;">
                    </div>
                    <div class="campo">
                        <label style="font-weight: bold;">Senha:</label>
                        <input type="password" id="novaSenha" required style="width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #ccc;">
                    </div>
                </div>

                <div class="campo">
                    <label style="font-weight: bold;">Nível de Permissão:</label>
                    <select id="nivelAcesso" style="width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #ccc; background: white;">
                        <option value="admin">Admin</option>
                        <option value="secre">Secretário(a)</option>
                        <option value="apoio">Apoio</option>
                        <option value="coord">Coordenadora</option>
                        <option value="user">Resp. Grupo</option>
                    </select>
                </div>

                <button type="submit" id="btnSalvarUser" class="btn-salvar" style="padding: 12px; font-weight: bold; cursor: pointer;">💾 Criar Usuário</button>
            </form>
        </section>

        <hr style="margin: 30px 0; border: 0; border-top: 1px solid #eee;">

        <section>
            <h3 style="display: flex; align-items: center; gap: 10px;">👥 Usuários Ativos</h3>
            <div class="tabela-responsiva" style="background: white; border-radius: 12px; overflow: hidden; border: 1px solid #eee;">
                <table style="width: 100%; border-collapse: collapse;">
                    <thead>
                        <tr>
                            <th style="text-align: left;">Usuário</th>
                            <th class="col-nivel">Nível</th>
                            <th class="col-acao">Ações</th>
                        </tr>
                    </thead>
                    <tbody id="corpoTabelaUsuarios">
                        <tr><td colspan="3" style="text-align: center; padding: 20px;">Buscando dados...</td></tr>
                    </tbody>
                </table>
            </div>
        </section>

        <div style="margin-top:30px; display: flex; gap: 10px;">
            <a href="dashboard.html" class="btn-voltar" style="flex: 1; text-align: center; text-decoration: none; padding: 12px; background: #6c757d; color: white; border-radius: 8px; font-weight: bold;">← Painel</a>
            <button onclick="logout()" style="flex: 1; padding: 12px; background: #dc3545; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold;">🚪 Sair</button>
        </div>
    </div>

    <script src="../js/supabase-config.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/script.js"></script>

    <script>
        async function atualizarTabelaUsuarios() {
            const corpo = document.getElementById('corpoTabelaUsuarios');
            try {
                const { data: usuarios, error } = await _supabase
                    .from('usuarios')
                    .select('*')
                    .order('login', { ascending: true });

                if (error) throw error;

                corpo.innerHTML = usuarios.map(u => `
                    <tr>
                        <td style="font-weight: 500;">${u.login}</td>
                        <td><span class="tag-nivel">${u.permissao || u.nivel}</span></td>
                        <td class="col-acao">
                            <button onclick="solicitarNovaSenha('${u.id}', '${u.login}')" class="btn-tabela btn-senha" title="Nova Senha">🔑</button>
                            <button onclick="executarExclusao('${u.id}')" class="btn-tabela btn-excluir" title="Remover">🗑️</button>
                        </td>
                    </tr>
                `).join('');
            } catch (err) {
                corpo.innerHTML = '<tr><td colspan="3" style="text-align:center;">Falha ao carrergar.</td></tr>';
            }
        }

        document.addEventListener('DOMContentLoaded', async () => {
            const user = verificarAcesso();
            if (user) {
                document.getElementById('nomeAdmin').innerText = user.login;
                // Só Admin pode entrar aqui
                if (user.permissao !== 'admin') {
                    alert('Restrito ao Admin!');
                    window.location.href = 'dashboard.html';
                }
                atualizarTabelaUsuarios();
            }
        });

        async function solicitarNovaSenha(id, login) {
            const nova = prompt(`Nova senha para: ${login}`);
            if (nova && nova.length >= 4) {
                await _supabase.from('usuarios').update({ senha: nova }).eq('id', id);
                alert('Senha atualizada!');
            }
        }

        async function executarExclusao(id) {
            if (confirm('Excluir este acesso permanentemente?')) {
                await _supabase.from('usuarios').delete().eq('id', id);
                atualizarTabelaUsuarios();
            }
        }

        document.getElementById('formUsuario').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btnSalvarUser');
            btn.disabled = true;
            
            const dados = {
                login: document.getElementById('novoLogin').value.trim(),
                senha: document.getElementById('novaSenha').value.trim(),
                permissao: document.getElementById('nivelAcesso').value
            };

            try {
                const { error } = await _supabase.from('usuarios').insert([dados]);
                if (error) throw error;
                alert("Usuário criado!");
                document.getElementById('formUsuario').reset();
                atualizarTabelaUsuarios();
            } catch (err) {
                alert("Erro ao criar. Login pode já existir.");
            } finally {
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
