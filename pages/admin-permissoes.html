<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Permissões - ICM</title>
    <link rel="stylesheet" href="../css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .table-container { width: 100%; overflow-x: auto; margin-top: 20px; }
        table { width: 100%; border-collapse: collapse; background: white; font-size: 0.85rem; }
        th, td { padding: 10px; border: 1px solid #ddd; text-align: center; }
        th { background: #2c3e50; color: white; }
        .func-col { text-align: left; font-weight: bold; background: #f9f9f9; width: 40%; }
        .sticky-col { position: sticky; left: 0; z-index: 1; }
        input[type="checkbox"] { width: 18px; height: 18px; cursor: pointer; }
        .btn-acao { width: 100%; padding: 15px; margin-top: 15px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; }
        .btn-save { background: #27ae60; color: white; }
    </style>
</head>
<body>
    <div class="container">
        <header style="text-align: center;">
            <h2>🛡️ Gestão de Acessos</h2>
            <select id="select-nivel" onchange="carregarPermissoesDoNivel()" style="padding: 10px; width: 100%; border-radius: 8px; margin-bottom: 10px;">
                <option value="coord">Coordenadora</option>
                <option value="apoio">Apoio</option>
                <option value="user">Responsável (User)</option>
                <option value="secre">Secretário</option>
            </select>
        </header>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th class="func-col">Funcionalidade</th>
                        <th>Liberar</th>
                    </tr>
                </thead>
                <tbody id="lista-permissoes">
                    </tbody>
            </table>
        </div>

        <button class="btn-save btn-acao" onclick="salvarPermissoes()">Gravar Configurações</button>
        <button class="btn-voltar-estilo btn-acao" onclick="window.location.href='dashboard.html'">Voltar</button>
    </div>

    <script src="../js/script.js"></script>
    <script src="../js/permissoes.js"></script>
</body>
</html>
