<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CIAs - ICM</title>
    <link rel="stylesheet" href="../css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .contador-group {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid #eee;
        }
        .controls {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .btn-ctrl {
            width: 40px;
            height: 40px;
            border-radius: 8px;
            border: none;
            background: #007bff;
            color: white;
            font-size: 22px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .btn-minus { background: #e74c3c; }
        .count-val { font-size: 20px; font-weight: bold; min-width: 35px; text-align: center; }
        
        .section-title { 
            background: #f8f9fa; 
            padding: 10px; 
            border-radius: 8px; 
            margin-top: 25px;
            border-left: 5px solid #007bff;
            font-size: 1.1rem;
            color: #2c3e50;
        }

        .card-header-event {
            background: #fff;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            margin-bottom: 20px;
            border: 1px solid #eee;
        }

        .input-evento {
            width: 100%;
            padding: 12px;
            margin-top: 5px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 1rem;
            background-color: white;
        }
    </style>
</head>
<body>
    <div class="container">
        <header style="display: flex; align-items: center; margin-bottom: 20px;">
            <a href="dashboard.html" class="btn-voltar" style="text-decoration: none;">← Voltar</a>
            <h1 style="flex-grow: 1; text-align: center; margin-right: 60px;">📚 CIAs 📚</h1>
        </header>

        <section class="card-header-event">
            <label>📅 Data do Evento</label>
            <input type="date" id="data_especial" class="input-evento">
            
            <label>📍 Local Evento (Igreja)</label>
            <select id="local_evento" class="input-evento">
                <option value="">Carregando igrejas...</option>
            </select>

            <label>📝 Descrição:</label>
            <input type="text" id="desc_evento" placeholder="Ex: Crianças, Intermediários ou Adolescentes" class="input-evento">
        </section>

        <h3 class="section-title">👥 MEMBROS</h3>
        <div class="card" id="grupoMembros"></div>

        <h3 class="section-title">🌟 VISITANTES</h3>
        <div class="card" id="grupoVisitantes"></div>

        <section style="margin-top: 30px; gap: 12px; display: flex; flex-direction: column;">
            <button onclick="salvarEventoEspecial()" class="btn-salvar" style="background: #2ecc71; padding: 18px;">💾 Salvar/Atualizar</button>
            <button onclick="gerarWhatsEspecial()" class="btn-salvar" style="background: #25d366; padding: 18px;">📱 Enviar Resumo WhatsApp</button>
        </section>
    </div>

    <script src="../js/script.js"></script>
    <script>
    // Função para buscar as igrejas que o secretário cadastrou
    async function carregarIgrejas() {
        const select = document.getElementById('local_evento');
        try {
            const { data, error } = await _supabase
                .from('igrejas_locais')
                .select('nome_igreja')
                .order('nome_igreja', { ascending: true });

            if (error) throw error;

            if (data && data.length > 0) {
                select.innerHTML = '<option value="">Selecione a Igreja...</option>' + 
                    data.map(i => `<option value="${i.nome_igreja}">${i.nome_igreja}</option>`).join('');
            } else {
                select.innerHTML = '<option value="">Nenhuma igreja cadastrada</option>';
            }
        } catch (err) {
            console.error("Erro ao carregar igrejas:", err);
            select.innerHTML = '<option value="">Erro na conexão</option>';
        }
    }

    window.onload = async () => {
        // Carrega as opções do Select primeiro
        await carregarIgrejas();

        const categorias = ["Varões", "Senhoras", "Jovens", "Adolescentes", "Intermediários", "Crianças", "Crianças de Colo"];
        
        const renderContadores = (containerId, prefixo) => {
            const container = document.getElementById(containerId);
            container.innerHTML = categorias.map(cat => `
                <div class="contador-group">
                    <span style="font-weight: 500; color: #444;">${cat}</span>
                    <div class="controls">
                        <button class="btn-ctrl btn-minus" onclick="alterarContador('${prefixo}_${cat}', -1)">-</button>
                        <span class="count-val" id="val_${prefixo}_${cat}">0</span>
                        <button class="btn-ctrl" onclick="alterarContador('${prefixo}_${cat}', 1)">+</button>
                    </div>
                </div>
            `).join('');
        };

        renderContadores('grupoMembros', 'membro');
        renderContadores('grupoVisitantes', 'vis');

        const urlParams = new URLSearchParams(window.location.search);
        const idEvento = urlParams.get('id');

        if (idEvento) {
            document.querySelector('h1').innerText = "📝 Editar CIAs";
            try {
                const { data, error } = await _supabase
                    .from('eventos_especiais')
                    .select('*')
                    .eq('id', idEvento)
                    .single();

                if (error) throw error;

                document.getElementById('data_especial').value = data.data_evento;
                document.getElementById('desc_evento').value = data.descricao;
                
                // Pequeno delay para o select carregar as opções antes de selecionar a correta
                setTimeout(() => {
                    document.getElementById('local_evento').value = data.local_evento;
                }, 500);

                // Membros
                document.getElementById('val_membro_Varões').innerText = data.m_varoes || 0;
                document.getElementById('val_membro_Senhoras').innerText = data.m_senhoras || 0;
                document.getElementById('val_membro_Jovens').innerText = data.m_jovens || 0;
                document.getElementById('val_membro_Adolescentes').innerText = data.m_adolescentes || 0;
                document.getElementById('val_membro_Intermediários').innerText = data.m_intermediarios || 0;
                document.getElementById('val_membro_Crianças').innerText = data.m_criancas || 0;
                document.getElementById('val_membro_Crianças de Colo').innerText = data.m_colo || 0;

                // Visitantes
                document.getElementById('val_vis_Varões').innerText = data.v_varoes || 0;
                document.getElementById('val_vis_Senhoras').innerText = data.v_senhoras || 0;
                document.getElementById('val_vis_Jovens').innerText = data.v_jovens || 0;
                document.getElementById('val_vis_Adolescentes').innerText = data.v_adolescentes || 0;
                document.getElementById('val_vis_Intermediários').innerText = data.v_intermediarios || 0;
                document.getElementById('val_vis_Crianças').innerText = data.v_criancas || 0;
                document.getElementById('val_vis_Crianças de Colo').innerText = data.v_colo || 0;

                garantirCampoEdicao(idEvento);

            } catch (err) {
                console.error("Erro ao carregar dados de edição:", err);
            }
        } else {
            const hoje = new Date();
            const dataLocal = hoje.toLocaleDateString('sv-SE');
            document.getElementById('data_especial').value = dataLocal;
        }
    };

    function garantirCampoEdicao(id) {
        let hiddenId = document.getElementById('id_evento_edicao');
        if (!hiddenId) {
            hiddenId = document.createElement('input');
            hiddenId.type = 'hidden';
            hiddenId.id = 'id_evento_edicao';
            document.body.appendChild(hiddenId);
        }
        hiddenId.value = id;
    }

    function alterarContador(id, delta) {
        const el = document.getElementById(`val_${id}`);
        let atual = parseInt(el.innerText);
        atual = Math.max(0, atual + delta);
        el.innerText = atual;
    }
    </script>
</body>
</html>
