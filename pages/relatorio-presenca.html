<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Relatório de Frequência - ICM</title>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .card-filtros {
            background: #fff;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            margin-bottom: 20px;
        }
        .filtros-container {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            align-items: flex-end;
        }
        .filtro-item {
            display: flex;
            flex-direction: column;
            gap: 8px;
            flex: 1;
            min-width: 200px;
        }
        .filtro-item label {
            font-size: 0.9rem;
            font-weight: 600;
            color: #2c3e50;
        }
        .tabela-frequencia {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }
        .tabela-frequencia th {
            background-color: #f8f9fa;
            color: #333;
            text-align: left;
            padding: 15px 10px;
            border-bottom: 2px solid #dee2e6;
        }
        .tabela-frequencia td {
            padding: 12px 10px;
            border-bottom: 1px solid #eee;
        }
        .alerta-ausencia {
            color: #d63031;
            font-weight: bold;
            background: #fff0f0;
            padding: 4px 8px;
            border-radius: 4px;
            display: inline-block;
        }
        .status-presente {
            color: #27ae60;
            font-weight: 600;
        }
        @media (max-width: 600px) {
            .filtros-container { flex-direction: column; align-items: stretch; }
            .btn-primario { width: 100%; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header style="text-align: center; margin-bottom: 25px;">
            <h1 style="color: #2c3e50;">📊 Relatório de Frequência</h1>
            <button onclick="window.location.href='dashboard.html'" class="btn-voltar">⬅ Voltar para Painel</button>
        </header>

        <section class="card-filtros">
            <h3 style="margin-top:0; color: #34495e; margin-bottom: 15px;">🔍 Parâmetros da Consulta</h3>
            <div class="filtros-container">
                
                <div class="filtro-item">
                    <label>Data de Referência</label>
                    <input type="date" id="filtroData" style="padding: 10px; border-radius: 6px; border: 1px solid #ccc;">
                </div>

                <div class="filtro-item">
                    <label>Público Alvo</label>
                    <select id="filtroVinculo" style="padding: 10px; border-radius: 6px; border: 1px solid #ccc;">
                        <option value="todos">Todos (Membros e Visitantes)</option>
                        <option value="Membro">Apenas Membros</option>
                        <option value="Visitante">Apenas Visitantes</option>
                    </select>
                </div>

                <button onclick="gerarNovoRelatorioFrequencia()" class="btn-primario" style="height: 45px; min-width: 180px;">
                    Gerar Relatório
                </button>
            </div>
        </section>

        <section class="card" style="margin-top: 20px; padding: 15px;">
            <h3 style="margin-bottom: 15px;">📋 Detalhamento da Frequência</h3>
            <div style="width: 100%; overflow-x: auto;">
                <table class="tabela-frequencia" id="tabelaRelatorio">
                    <thead>
                        <tr>
                            <th>Nome</th>
                            <th>Última Presença</th>
                            <th>Dias Ausente</th>
                            <th>Status no Dia</th>
                        </tr>
                    </thead>
                    <tbody id="corpoRelatorio">
                        <tr>
                            <td colspan="4" style="text-align:center; padding: 40px; color: #999; font-style: italic;">
                                Ajuste a data e o público acima para visualizar os dados.
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </section>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/supabase-config.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/relatorios.js"></script> <script src="../js/script.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            verificarAcesso();
            const hoje = new Date();
            // Formato ISO para o input date (AAAA-MM-DD)
            document.getElementById('filtroData').value = hoje.toISOString().split('T')[0];
        });
    </script>
</body>
</html>
