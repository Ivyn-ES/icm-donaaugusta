<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestão de Grupos - ICM</title>
    <link rel="stylesheet" href="../css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .btn-excluir { background: none; border: none; cursor: pointer; font-size: 1.2rem; color: #e74c3c; }
        .btn-excluir:hover { transform: scale(1.1); }
        td, th { padding: 12px; border-bottom: 1px solid #eee; }

        /* Ajustes no formulário para não espremer o campo */
        .form-container {
            display: flex; 
            gap: 10px; 
            align-items: flex-end;
            width: 100%;
        }

        .btn-adicionar-curto {
            padding: 12px 15px; /* Padding reduzido nas laterais */
            border-radius: 8px; 
            font-weight: bold;
            background-color: #27ae60;
            color: white;
            border: none;
            cursor: pointer;
            white-space: nowrap; /* Impede o texto de quebrar linha */
            min-width: fit-content;
        }

        /* Responsividade para telas muito pequenas */
        @media (max-width: 400px) {
            .form-container {
                flex-direction: column;
                align-items: stretch;
            }
            .btn-adicionar-curto {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header style="text-align: center; margin-bottom: 20px; border-bottom: 2px solid #eee; padding-bottom: 10px;">
            <h1 style="margin:0;">📂 Gestão de Grupos</h1>
        </header>

        <section class="admin-section" style="background: #f9f9f9; padding: 20px; border-radius: 12px; border: 1px solid #eee; box-shadow: 0 4px 6px rgba(0,0,0,0.05);">
            <form id="formGrupo" class="form-container">
                <div class="campo" style="flex: 2;"> <label for="nomeGrupo" style="display: block; margin-bottom: 5px; font-weight: bold;">Novo Grupo:</label>
                    <input type="text" id="nomeGrupo" placeholder="Ex: Grupo 01" required style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #ccc; box-sizing: border-box;">
                </div>
                <button type="submit" id="btnSalvar" class="btn-adicionar-curto">➕ Adicionar</button>
            </form>
        </section>

        <hr style="margin: 30px 0; border: 0; border-top: 1px solid #ddd;">

        <section>
            <h3 style="margin-bottom: 15px; display: flex; align-items: center; gap: 10px;">📋 Grupos Atuais</h3>
            <div class="tabela-responsiva">
                <table style="width: 100%; border-collapse: collapse;">
                    <thead>
                        <tr style="background: #f8f9fa;">
                            <th style="text-align: left;">Nome do Grupo</th>
                            <th style="text-align: center; width: 100px;">Ações</th>
                        </tr>
                    </thead>
                    <tbody id="corpoTabelaGrupos">
                        <tr>
                            <td colspan="2" style="text-align: center; padding: 20px;">Buscando grupos no servidor...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </section>

        <div style="margin-top: 30px;">
            <a href="dashboard.html" class="btn-voltar" style="display: block; text-align: center; text-decoration: none; padding: 12px; background: #636e72; color: white; border-radius: 8px; font-weight: bold;">⬅ Voltar ao Painel</a>
        </div>
    </div>

    <script src="../js/supabase-config.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/script.js"></script>

    <script>
        async function listarGrupos() {
            const corpo = document.getElementById('corpoTabelaGrupos');
            try {
                const { data: grupos, error } = await _supabase
                    .from('grupos')
                    .select('*')
                    .order('nome', { ascending: true });

                if (error) throw error;

                if (!grupos || grupos.length === 0) {
                    corpo.innerHTML = "<tr><td colspan='2' style='text-align:center; padding:20px;'>Nenhum grupo cadastrado.</td></tr>";
                    return;
                }

                corpo.innerHTML = grupos.map(g => `
                    <tr>
                        <td style="font-weight: 500;">${g.nome}</td>
                        <td style="text-align: center;">
                            <button onclick="deletarGrupo('${g.id}', '${g.nome}')" class="btn-excluir" title="Excluir Grupo">🗑️</button>
                        </td>
                    </tr>
                `).join('');

            } catch (err) {
                console.error("Erro:", err);
                corpo.innerHTML = "<tr><td colspan='2' style='text-align:center; color:red;'>Falha ao carregar grupos.</td></tr>";
            }
        }

        async function deletarGrupo(id, nome) {
            if (!confirm(`Tem certeza que deseja excluir o "${nome}"?\nIsso pode afetar membros vinculados.`)) return;
            
            try {
                const { error } = await _supabase.from('grupos').delete().eq('id', id);
                if (error) throw error;
                listarGrupos();
            } catch (err) {
                alert("Erro ao excluir grupo. Verifique se existem membros vinculados.");
            }
        }

        document.addEventListener('DOMContentLoaded', async () => {
            if (typeof verificarAcesso === 'function') {
                const user = verificarAcesso();
                if (user) {
                    const nivel = (user.permissao || user.nivel || "").toLowerCase();
                    if (nivel !== 'admin' && nivel !== 'master') {
                        alert('Acesso negado!');
                        window.location.href = 'dashboard.html';
                        return;
                    }
                }
            }
            listarGrupos();
        });

        document.getElementById('formGrupo').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btnSalvar');
            const campoNome = document.getElementById('nomeGrupo');
            const nome = campoNome.value.trim();

            btn.disabled = true;
            btn.innerText = "⌛";

            try {
                const { error } = await _supabase.from('grupos').insert([{ nome: nome }]);
                if (error) throw error;
                
                campoNome.value = "";
                listarGrupos();
            } catch (err) {
                console.error(err);
                alert("Erro ao salvar grupo.");
            } finally {
                btn.disabled = false;
                btn.innerText = "➕ Adicionar";
            }
        });
    </script>
</body>
</html>
