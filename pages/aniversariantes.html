<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aniversariantes - ICM</title>
    <link rel="stylesheet" href="../css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        body { display: block !important; }

        .container-aniversarios {
            background: white;
            padding: 2rem;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 800px;
            margin: 20px auto;
        }

        .filtros-aniversario {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            margin-top: 20px;
            margin-bottom: 25px;
            align-items: flex-end;
        }

        .campo-filtro {
            display: flex;
            flex-direction: column;
            flex: 1;
            min-width: 150px;
        }

        .area-botoes {
            display: flex;
            gap: 10px;
            width: 100%;
            margin-top: 10px;
        }

        .btn-acao {
            flex: 1;
            padding: 15px;
            border: none;
            border-radius: 12px;
            font-weight: bold;
            font-size: 1rem;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-consultar { background-color: #27ae60; }
        .btn-zap { background-color: #25d366; }

        @media (min-width: 600px) {
            .area-botoes { width: auto; margin-top: 0; }
            .btn-acao { flex: none; padding: 12px 25px; }
        }

        td { padding: 12px 8px; }
        th { background-color: #f8f9fa; color: #2d3436; }
    </style>
</head>
<body>

    <div class="container-aniversarios">
        <header style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; border-bottom: 2px solid #eee; padding-bottom: 10px;">
            <a href="dashboard.html" class="btn-voltar" style="text-decoration: none;">← Voltar</a>
            <h1 style="margin: 0; flex-grow: 1; text-align: center;">🎂 Aniversariantes</h1>
            <div style="width: 80px;"></div>
        </header>

        <section class="filtros-aniversario">
            <div class="campo-filtro">
                <label>📅 Mês:</label>
                <select id="filtroMes">
                    <option value="Janeiro">Janeiro</option>
                    <option value="Fevereiro">Fevereiro</option>
                    <option value="Março">Março</option>
                    <option value="Abril">Abril</option>
                    <option value="Maio">Maio</option>
                    <option value="Junho">Junho</option>
                    <option value="Julho">Julho</option>
                    <option value="Agosto">Agosto</option>
                    <option value="Setembro">Setembro</option>
                    <option value="Outubro">Outubro</option>
                    <option value="Novembro">Novembro</option>
                    <option value="Dezembro">Dezembro</option>
                </select>
            </div>

            <div class="campo-filtro">
                <label>👥 Opção:</label>
                <select id="filtroSexo">
                    <option value="Todos">Todos</option>
                    <option value="Masculino">Irmãos</option>
                    <option value="Feminino">Irmãs</option>
                </select>
            </div>

            <div class="area-botoes">
                <button onclick="gerarRelatorioAniversariantes()" class="btn-acao btn-consultar">🔍 Consultar</button>
                <button onclick="enviarAniversariantesZap()" class="btn-acao btn-zap">📲 WhatsApp</button>
            </div>
        </section>

        <div class="tabela-responsiva">
            <table>
                <thead>
                    <tr>
                        <th style="text-align: center; width: 60px;">Dia</th>
                        <th>Nome</th>
                        <th style="text-align: center; width: 80px;">Opção</th>
                    </tr>
                </thead>
                <tbody id="corpoTabelaAniversarios"></tbody>
            </table>
        </div>
        
        <div id="msgVazia" style="display:none; text-align:center; padding: 30px; color: #636e72; font-weight: bold;">
            Nenhum aniversariante encontrado.
        </div>
    </div>

    <script src="../js/supabase-config.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/script.js"></script>

    <script>
        let aniversariantesFiltrados = [];

        // FUNÇÃO DE ÍCONES CORRIGIDA
        function obterEmoji(sexo, categoria) {
            // Normaliza o texto (remove acentos e espaços extras) para comparação segura
            const cat = (categoria || "")
                .normalize("NFD")
                .replace(/[\u0300-\u036f]/g, "")
                .toUpperCase()
                .trim();

            // Verifica se pertence ao grupo de CIAs
            const ehCia = cat.includes("CIA") || 
                          cat.includes("ADOLESCENTE") || 
                          cat.includes("CRIANCA") || 
                          cat.includes("INTERMEDIARIO");

            if (sexo === 'Masculino') {
                return ehCia ? "👕" : "👔";
            } else {
                return ehCia ? "🌷" : "💐";
            }
        }

        async function gerarRelatorioAniversariantes() {
            const mesBusca = document.getElementById('filtroMes').value;
            const sexoBusca = document.getElementById('filtroSexo').value;
            const corpo = document.getElementById('corpoTabelaAniversarios');
            const msgVazia = document.getElementById('msgVazia');

            if(!corpo) return;
            corpo.innerHTML = "<tr><td colspan='3' style='text-align:center; padding: 20px;'>Buscando...</td></tr>";

            try {
                let { data: membros, error } = await _supabase
                    .from('membros')
                    .select('nome, apelido, dia, mes, sexo, categoria')
                    .eq('status_registro', 'Ativo')
                    .eq('mes', mesBusca);

                if (error) throw error;

                // Filtro de dia válido e sexo selecionado
                aniversariantesFiltrados = membros.filter(m => {
                    const diaNum = parseInt(m.dia);
                    const diaValido = !isNaN(diaNum) && diaNum > 0;
                    const matchesSexo = (sexoBusca === 'Todos' || m.sexo === sexoBusca);
                    return diaValido && matchesSexo;
                });

                // Ordenação por dia
                aniversariantesFiltrados.sort((a, b) => parseInt(a.dia) - parseInt(b.dia));

                if (aniversariantesFiltrados.length === 0) {
                    corpo.innerHTML = "";
                    msgVazia.style.display = 'block';
                    return;
                }

                msgVazia.style.display = 'none';
                corpo.innerHTML = aniversariantesFiltrados.map(m => {
                    const nomeExibir = m.apelido || m.nome.split(' ')[0];
                    const iconDiferenciado = obterEmoji(m.sexo, m.categoria);

                    return `
                        <tr>
                            <td style="text-align: center; font-weight: bold;">${m.dia}</td>
                            <td>${nomeExibir}</td>
                            <td style="text-align: center; font-size: 1.2rem;">${iconDiferenciado}</td>
                        </tr>
                    `;
                }).join('');

            } catch (err) {
                console.error("Erro:", err);
                corpo.innerHTML = "<tr><td colspan='3' style='color:red; text-align:center;'>Erro ao carregar dados.</td></tr>";
            }
        }

        function enviarAniversariantesZap() {
            if (aniversariantesFiltrados.length === 0) {
                alert("Consulte a lista primeiro.");
                return;
            }

            const mesNome = document.getElementById('filtroMes').value;
            let msg = `🎂 *Aniversariantes de ${mesNome} - ICM*\n\n`;

            aniversariantesFiltrados.forEach(m => {
                const nomeZap = m.apelido || m.nome.split(' ')[0];
                const emojiZap = obterEmoji(m.sexo, m.categoria);
                msg += `*${m.dia}* - ${nomeZap} ${emojiZap}\n`;
            });

            msg += `\n_²⁴ Este é o dia que fez o Senhor; regozijemo-nos e alegremo-nos nele. - Salmos 118:24_ 🙌`;

            const url = `https://api.whatsapp.com/send?text=${encodeURIComponent(msg)}`;
            window.open(url, '_blank');
        }

        // Inicialização automática
        document.addEventListener('DOMContentLoaded', () => {
            // Verifica acesso via auth.js
            if (typeof verificarAcesso === 'function') verificarAcesso();

            const meses = ["Janeiro", "Fevereiro", "Março", "Abril", "Maio", "Junho", "Julho", "Agosto", "Setembro", "Outubro", "Novembro", "Dezembro"];
            const mesAtualNome = meses[new Date().getMonth()];
            const selectMes = document.getElementById('filtroMes');
            if(selectMes) selectMes.value = mesAtualNome;
            
            // Pequeno delay para garantir que o Supabase carregou
            setTimeout(gerarRelatorioAniversariantes, 300);
        });
    </script>
</body>
</html>
