<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - ICM Dona Augusta</title>
    <link rel="stylesheet" href="../css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .switch-container {
            display: flex; align-items: center; justify-content: space-between;
            background: #fff3e0; padding: 12px; border-radius: 8px;
            border: 1px solid #ffe0b2; margin-bottom: 20px;
        }
        .switch { position: relative; display: inline-block; width: 50px; height: 24px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0;
            background-color: #ccc; transition: .4s; border-radius: 24px;
        }
        .slider:before {
            position: absolute; content: ""; height: 16px; width: 16px;
            left: 4px; bottom: 4px; background-color: white; transition: .4s; border-radius: 50%;
        }
        input:checked + .slider { background-color: #ff9800; }
        input:checked + .slider:before { transform: translateX(26px); }
        .campo-full { margin-bottom: 20px; }
        .campo-full select, .campo-full input { width: 100%; padding: 10px; border-radius: 5px; border: 1px solid #ddd; }
    </style>
</head>
<body>

    <div class="container">
        <header style="text-align: center; margin-bottom: 20px;">
            <h1 id="tituloPagina">📝 Cadastro de Membros</h1>
            <p>Preencha os dados para salvar no sistema</p>
        </header>

        <form id="formCadastro">
            <div style="background: #f9f9f9; padding: 15px; border-radius: 8px; margin-bottom: 20px; border-left: 5px solid #007bff;">
                <div class="campo">
                    <label for="nome_completo">Nome Completo:</label>
                    <input type="text" id="nome_completo" required>
                </div>
                <div class="campo" style="margin-top: 10px;">
                    <label for="apelido">Nome de Preferência (Apelido):</label>
                    <input type="text" id="apelido">
                </div>
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px;">
                <div class="campo">
                    <label for="funcao">Função:</label>
                    <select id="funcao">
                        <option value="Membro">Membro</option>
                        <option value="Obreiro">Obreiro</option>
                        <option value="Diácono">Diácono</option>
                        <option value="Pastor">Pastor</option>
                    </select>
                </div>
                <div class="campo">
                    <label for="situacao">Situação:</label>
                    <select id="situacao">
                        <option value="Membro">Membro</option>
                        <option value="Visitante">Visitante</option>
                    </select>
                </div>
            </div>

            <div class="linha-dupla">
                <div class="campo">
                    <label for="categoria">Classe/Categoria:</label>
                    <select id="categoria">
                        <option value="Adulto">Adulto</option>
                        <option value="Jovem">Jovem</option>
                        <option value="Adolescente">Adolescente</option>
                        <option value="Intermediário">Intermediário</option>
                        <option value="Criança">Criança</option>
                    </select>
                </div>
                <div class="campo">
                    <label for="sexo">Sexo:</label>
                    <select id="sexo">
                        <option value="Masculino">Masculino</option>
                        <option value="Feminino">Feminino</option>
                    </select>
                </div>
            </div>

            <div class="switch-container">
                <div><span style="font-weight: bold; display: block;">👴 Membro Idoso?</span></div>
                <label class="switch">
                    <input type="checkbox" id="eh_idoso">
                    <span class="slider"></span>
                </label>
            </div>

            <div class="campo-full">
                <label for="grupo_vinculado">Grupo:</label>
                <select id="grupo_vinculado" required>
                    <option value="">Carregando grupos...</option>
                </select>
            </div>
                
            <div class="campo-full">
                <label>Aniversário:</label>
                <div style="display: flex; gap: 10px; margin-top: 5px;">
                    <input type="number" id="niver_dia" placeholder="Dia" min="0" max="31" style="width: 80px;">
                    <select id="niver_mes" style="flex: 1;">
                        <option value="">Mês...</option>
                        <option value="Janeiro">Janeiro</option><option value="Fevereiro">Fevereiro</option>
                        <option value="Março">Março</option><option value="Abril">Abril</option>
                        <option value="Maio">Maio</option><option value="Junho">Junho</option>
                        <option value="Julho">Julho</option><option value="Agosto">Agosto</option>
                        <option value="Setembro">Setembro</option><option value="Outubro">Outubro</option>
                        <option value="Novembro">Novembro</option><option value="Dezembro">Dezembro</option>
                    </select>
                </div>
            </div>

            <div style="margin-top: 30px; display: flex; flex-direction: column; gap: 10px;">
                <button type="submit" class="btn-salvar" id="btnSalvar">Salvar Dados</button>
                <button type="button" onclick="window.location.href='lista-membros.html'" class="btn-voltar">⬅ Cancelar</button>
            </div>
        </form>
    </div>

    <script src="../js/supabase-config.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/script.js"></script>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        let idEdicao = urlParams.get('id');

        // FUNÇÃO PARA CARREGAR GRUPOS DIRETAMENTE DO BANCO
        async function buscarGruposDoBanco() {
            const selectGrupo = document.getElementById('grupo_vinculado');
            try {
                const { data, error } = await _supabase
                    .from('grupos')
                    .select('nome_grupo')
                    .order('nome_grupo', { ascending: true });

                if (error) throw error;

                let options = '<option value="">Selecione um Grupo</option>';
                data.forEach(g => {
                    options += `<option value="${g.nome_grupo}">${g.nome_grupo}</option>`;
                });
                selectGrupo.innerHTML = options;
            } catch (err) {
                console.error("Erro ao carregar grupos:", err);
                selectGrupo.innerHTML = '<option value="">Erro ao carregar</option>';
            }
        }

        async function carregarDadosParaEdicao(id) {
            try {
                const { data, error } = await _supabase.from('membros').select('*').eq('id', id).single();
                if (error) throw error;
                if (data) {
                    document.getElementById('nome_completo').value = data.nome || "";
                    document.getElementById('apelido').value = data.apelido || "";
                    document.getElementById('funcao').value = data.funcao || "Membro";
                    document.getElementById('situacao').value = data.situacao || "Membro";
                    document.getElementById('sexo').value = data.sexo || "Masculino";
                    document.getElementById('categoria').value = data.categoria || "Adulto";
                    document.getElementById('eh_idoso').checked = data.eh_idoso || false;
                    document.getElementById('niver_dia').value = data.dia || ""; 
                    document.getElementById('niver_mes').value = data.mes || "";
                    
                    // Espera os grupos carregarem para selecionar o correto
                    setTimeout(() => {
                        document.getElementById('grupo_vinculado').value = data.grupo || "";
                    }, 500);
                }
            } catch (err) { console.error("Erro ao carregar dados do membro:", err); }
        }

        document.addEventListener('DOMContentLoaded', async () => {
            if (typeof verificarAcesso === 'function') verificarAcesso(); 
            
            // Busca os grupos primeiro
            await buscarGruposDoBanco();

            if (idEdicao) {
                document.getElementById('tituloPagina').innerText = "✏️ Editar Membro";
                document.getElementById('btnSalvar').innerText = "Atualizar Dados";
                await carregarDadosParaEdicao(idEdicao);
            }
        });

        document.getElementById('formCadastro').addEventListener('submit', async (e) => {
            e.preventDefault(); 
            const btn = document.getElementById('btnSalvar');
            btn.disabled = true;
            btn.innerText = '⌛ Processando...';

            const dadosParaSalvar = {
                nome: document.getElementById('nome_completo').value.trim(),
                apelido: document.getElementById('apelido').value.trim(),
                funcao: document.getElementById('funcao').value,
                situacao: document.getElementById('situacao').value,
                sexo: document.getElementById('sexo').value,
                categoria: document.getElementById('categoria').value,
                grupo: document.getElementById('grupo_vinculado').value,
                dia: parseInt(document.getElementById('niver_dia').value) || 0,
                mes: document.getElementById('niver_mes').value,
                eh_idoso: document.getElementById('eh_idoso').checked,
                status_registro: 'Ativo'
            };

            try {
                let resultado;
                if (idEdicao) {
                    resultado = await _supabase.from('membros').update(dadosParaSalvar).eq('id', idEdicao);
                } else {
                    resultado = await _supabase.from('membros').insert([dadosParaSalvar]);
                }

                if (resultado.error) throw resultado.error;
                
                alert("Salvo com sucesso!");
                window.location.href = 'lista-membros.html';
                
            } catch (err) { 
                alert("Erro ao salvar."); 
            } finally { 
                btn.disabled = false; 
                btn.innerText = idEdicao ? 'Atualizar Dados' : 'Salvar Dados'; 
            }
        });
    </script>
</body>
</html>
