<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - ICM Dona Augusta</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* Estilo para o Mural Interativo */
        .mural-container {
            margin-top: 25px;
            padding-top: 20px;
            border-top: 1px dashed #ccc;
            text-align: center;
        }

        .btn-mural {
            background-color: #f8f9fa;
            color: #2c3e50;
            border: 2px solid #3498db;
            padding: 12px 20px;
            border-radius: 12px;
            font-weight: bold;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            transition: all 0.2s;
            cursor: pointer;
            width: 100%;
            justify-content: center;
            box-sizing: border-box;
        }

        .btn-mural:hover {
            background-color: #3498db;
            color: white;
            transform: translateY(-2px);
        }

        .btn-mural span {
            font-size: 1.4rem;
        }
    </style>
</head>
<body>
    <div class="container login-card">
        <div class="login-header" style="text-align: center; display: flex; flex-direction: column; align-items: center;">
            <span style="font-size: 60px; display: block; margin-bottom: 10px;">📖</span>
            <h1 style="margin: 0;">ICM Dona Augusta</h1>
        </div>
        
        <form id="loginForm" class="login-form">
            <div class="input-group">
                <input type="text" id="usuario" placeholder="Usuário" required 
                       autocapitalize="none" spellcheck="false" autocomplete="username">
            </div>
            <div class="input-group">
                <input type="password" id="senha" placeholder="Senha" required>
            </div>
            
            <button type="submit" class="btn-login" id="btnEntrar">Entrar</button>
        </form>

        <p id="mensagem" class="error-msg" style="color: red; text-align: center; margin-top: 10px;"></p>

        <div class="mural-container">
            <a href="paginas/mural.html" class="btn-mural">
                <span>📢</span> Mural Interativo
            </a>
            <p style="font-size: 0.75rem; color: #7f8c8d; margin-top: 8px;">Acesso livre à programação e avisos</p>
        </div>

        <div class="version-tag" style="margin-top: 20px;">
            <small>Gerenciamento Local ICM - Dona Augusta</small>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase-config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/script.js"></script>
</body>
</html>
